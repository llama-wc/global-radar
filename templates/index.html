<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Radar</title>
    <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #00050a; font-family: sans-serif; overflow: hidden; transition: background 0.3s; }
        #globeViz { width: 100vw; height: 100vh; }
        .controls { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .legend { position: absolute; bottom: 30px; left: 20px; background: #111; color: white; padding: 15px; border-radius: 8px; border: 1px solid #333; z-index: 10; transition: all 0.3s; }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .legend-icon { width: 18px; height: 18px; margin-right: 10px; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: white; color: black; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        body.light-mode { background: #f0f2f5; }
        body.light-mode .legend { background: white; color: #333; border: 1px solid #ccc; }
        body.light-mode button { background: #333; color: white; }
    </style>
</head>
<body>
    <div id="globeViz"></div>
    <div class="controls">
        <button id="themeToggle">☀️ Light Mode</button>
    </div>
    <div class="legend">
        <div class="legend-item"><img class="legend-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300bcd4'%3E%3Cpath d='M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z'/%3E%3C/svg%3E"> Live Aviation</div>
        <div class="legend-item"><img class="legend-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff9800'%3E%3Cpath d='M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z'/%3E%3C/svg%3E"> Maritime Vessels</div>
        <div class="legend-item"><div class="legend-icon" style="background:#9c27b0; border-radius:50%; border:1px solid #ccc;"></div> Active Satellites</div>
    </div>

    <script>
        let globeInstance = Globe()(document.getElementById('globeViz'));
        let isDark = true;

        const darkGlobeTex = 'https://unpkg.com/three-globe/example/img/earth-dark.jpg';
        
        // Generate a solid blue canvas for Light Mode water
        const lightCanvas = document.createElement('canvas');
        lightCanvas.width = 4; lightCanvas.height = 4;
        const ctx = lightCanvas.getContext('2d');
        ctx.fillStyle = '#b7d5eb';
        ctx.fillRect(0, 0, 4, 4);
        const lightGlobeTex = lightCanvas.toDataURL();

        function applyTheme() {
            if (isDark) {
                globeInstance.globeImageUrl(darkGlobeTex)
                    .polygonCapColor(() => 'rgba(0,0,0,0)')
                    .polygonStrokeColor(() => '#333333');
            } else {
                globeInstance.globeImageUrl(lightGlobeTex)
                    .polygonCapColor(() => '#ffffff')
                    .polygonStrokeColor(() => '#cbd5e0');
            }
        }

        globeInstance.pointOfView({ lat: 39.8, lng: -98.5, altitude: 2.0 }, 0);
        applyTheme();

        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
            .then(res => res.json())
            .then(countries => {
                globeInstance.polygonsData(countries.features).polygonSideColor(() => 'rgba(0,0,0,0)').polygonsTransitionDuration(0);
            });

        document.getElementById('themeToggle').addEventListener('click', (e) => {
            isDark = !isDark;
            document.body.classList.toggle('light-mode');
            e.target.innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
            applyTheme();
        });

        // Data Rendering Loop
        setInterval(() => {
            fetch('/api/planes').then(res => res.json()).then(data => {
                const planes = (data.states || []).map(p => ({ lat: p[6], lng: p[5], name: p[1] }));
                globeInstance.customLayerData(planes).customThreeObject(d => {
                    const obj = new THREE.Mesh(
                        new THREE.ConeGeometry(0.5, 1.2, 4),
                        new THREE.MeshBasicMaterial({ color: '#00bcd4' })
                    );
                    obj.rotation.x = Math.PI/2;
                    return obj;
                });
            }).catch(() => {});

            fetch('/api/ships').then(res => res.json()).then(data => {
                globeInstance.pointsData(data.ships).pointColor(() => '#ff9800').pointRadius(0.3).pointAltitude(0.01);
            }).catch(() => {});

            fetch('/api/satellites').then(res => res.json()).then(data => {
                globeInstance.ringsData(data.sats).ringColor(() => '#9c27b0').ringMaxRadius(1.5).ringPropagationSpeed(2).ringRepeatPeriod(1000);
            }).catch(() => {});
        }, 5000);
    </script>
</body>
</html>
